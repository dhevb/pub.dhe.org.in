name: CI

on:
  push:
    branches: [main, master, platform-upgrade]
  pull_request:
    branches: [main, master, platform-upgrade]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run qa:papers
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://pub.dhe.org.in
          NEXT_PUBLIC_API_URL: https://vie-rase-backend.onrender.com
